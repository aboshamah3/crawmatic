# Alembic configuration for the one-shot migration job (SPEC-02 US1).
#
# No `sqlalchemy.url` here on purpose: `alembic/env.py` builds the engine
# from `Settings.MIGRATION_DATABASE_URL` (direct-to-Postgres, never the
# PgBouncer pooler `DATABASE_URL`), so both online (`alembic upgrade
# head`) and offline (`alembic upgrade head --sql`) modes go through the
# same env.py config path instead of a hard-coded URL here. Per
# contracts/migration-job.md / research.md D6.

[alembic]
# path to migration scripts.
script_location = alembic

# template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# sys.path path, prepended so `import app_shared` resolves from the
# repo-root uv workspace when env.py runs.
prepend_sys_path = .

# set to 'true' to search source files recursively
# in each "version_locations" directory
# recursive_version_locations = false

# the output encoding used when revision files
# are written from script.py.mako
output_encoding = utf-8

# NOTE: intentionally no `sqlalchemy.url` — see module docstring above.
# alembic/env.py errors clearly if MIGRATION_DATABASE_URL is unset when
# running online.

[post_write_hooks]
# no post-write hooks configured.

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
