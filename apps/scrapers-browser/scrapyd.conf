; Scrapyd configuration for the `scrapers-browser` (Playwright) node.
;
; The `username`/`password` values below are placeholder tokens, not
; real credentials: scrapyd.conf is a plain ini file with no native
; environment-variable interpolation, so the real values are rendered
; from SCRAPYD_USERNAME / SCRAPYD_PASSWORD by
; `docker-entrypoint.sh` at container start (before `scrapyd` execs) —
; see apps/scrapers-browser/Dockerfile. The Scrapy project itself is
; baked into the image at build time; no runtime
; `scrapyd-deploy`/addversion.json upload is used for this skeleton.
;
; max_proc = 1 (analyze A1): browser-driven jobs are resource-heavy
; (one Chromium instance per running job), so this node runs at most
; one Scrapy process at a time, independent of Scrapy's own
; CONCURRENT_REQUESTS/PLAYWRIGHT_MAX_CONTEXTS limits within that process.

[scrapyd]
eggs_dir      = eggs
logs_dir      = logs
items_dir     =
jobs_to_keep  = 5
dbs_dir       = dbs
max_proc      = 1
max_proc_per_cpu = 1
finished_to_keep = 100
poll_interval = 5.0
bind_address  = ::
http_port     = 6800
debug         = off
runner        = scrapyd.runner
application   = scrapyd.app.application
launcher      = scrapyd.launcher.Launcher
webroot       = scrapyd.website.Root

; HTTP basic auth (FR-012) — rendered from SCRAPYD_USERNAME/SCRAPYD_PASSWORD
; at container start; see docker-entrypoint.sh.
username      = __SCRAPYD_USERNAME__
password      = __SCRAPYD_PASSWORD__

[services]
schedule.json     = scrapyd.webservice.Schedule
cancel.json       = scrapyd.webservice.Cancel
addversion.json   = scrapyd.webservice.AddVersion
listprojects.json = scrapyd.webservice.ListProjects
listversions.json = scrapyd.webservice.ListVersions
listspiders.json  = scrapyd.webservice.ListSpiders
delversion.json   = scrapyd.webservice.DeleteVersion
delproject.json   = scrapyd.webservice.DeleteProject
listjobs.json     = scrapyd.webservice.ListJobs
daemonstatus.json = scrapyd.webservice.DaemonStatus
